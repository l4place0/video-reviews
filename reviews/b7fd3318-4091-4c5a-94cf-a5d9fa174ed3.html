const DATA = {"taskId": "b7fd3318-4091-4c5a-94cf-a5d9fa174ed3", "title": "【中文字幕】从零开始用 C 处理音频｜SDL 音频", "url": "https://www.bilibili.com/video/BV1UyL26XEP8/?spm_id_from=333.1007.tianma.2-3-6.click&vd_source=6bfe465d89f67076c9b85326820f4617", "platform": "bilibili", "summary": "## 结构化总结\n\n## 核心主题\n本教程演示如何在C语言中使用SDL2库，通过“队列音频”模式（而非回调模式）从零开始加载并播放一个WAV音频文件。\n\n## 前置条件\n1.  **基础知识**：C语言编程基础（函数、指针、变量）。\n2.  **开发环境**：安装了C编译器（如GCC）和SDL2开发库的环境（视频中使用Linux/Vim）。\n3.  **音频资源**：准备一个WAV格式的音频文件（如`sampleWave.wav`）。\n\n## 操作步骤\n1.  **创建与包含**：创建`.c`文件，包含SDL2头文件`#include <SDL2/SDL.h>`。\n2.  **初始化音频子系统**：调用`SDL_Init(SDL_INIT_AUDIO)`来初始化SDL的音频子系统。\n3.  **加载音频文件**：使用`SDL_LoadWAV`宏，传入文件名（如`\"sampleWave.wav\"`）、一个`SDL_AudioSpec`指针（用于接收格式信息）、`Uint8**`音频数据缓冲区指针和`Uint32`音频长度变量。该函数会填充音频规格并分配音频数据缓冲区。\n4.  **打开音频设备**：调用`SDL_OpenAudioDevice`，传入设备名（`NULL`表示默认）、`0`（表示播放而非录制）、从文件获得的`SDL_AudioSpec`、另一个`SDL_AudioSpec`指针（用于获取实际设备参数）以及`0`（允许变化）。此函数返回一个音频设备ID。\n5.  **队列音频数据**：调用`SDL_QueueAudio`，传入设备ID、加载获得的音频数据缓冲区和音频长度。\n6.  **取消暂停以播放**：调用`SDL_PauseAudioDevice`，传入设备ID和`0`（`0`表示取消暂停），以开始播放已队列的音频。\n7.  **等待播放完成**：使用`SDL_Delay`函数（如等待10000毫秒）让程序运行足够长的时间以播放完音频。\n8.  **清理资源**：播放结束后，按顺序调用`SDL_CloseAudioDevice`关闭设备，`SDL_FreeWAV`释放音频数据缓冲区，最后调用`SDL_Quit`退出SDL。\n\n## 关键要点\n1.  **模式选择**：SDL音频播放主要有回调模式和队列模式，本教程采用更直接的**队列模式**。\n2.  **初始化顺序**：必须先`SDL_Init`初始化子系统，才能进行任何音频操作。\n3.  **加载即得格式**：`SDL_LoadWAV`在加载文件的同时，会自动解析并填充音频文件的`SDL_AudioSpec`（格式、采样率等）。\n4.  **播放的前提**：音频数据只是被“队列”了，必须调用`SDL_PauseAudioDevice(device_id, 0)`取消暂停，设备才会开始播放队列中的音频。\n5.  **资源清理**：必须手动释放`SDL_LoadWAV`分配的音频缓冲区（`SDL_FreeWAV`），并关闭设备和退出SDL。\n\n## 常见问题/注意事项\n1.  **头文件错误**：包含SDL头文件时，路径可能写错（如`SDL.h` vs `SDL2/SDL.h`），需根据系统调整。\n2.  **音频不播放**：最常见的原因是忘记在队列音频后调用`SDL_PauseAudioDevice(device_id, 0)`取消暂停。\n3.  **程序提前退出**：如果程序在调用`SDL_QueueAudio`后立即结束，音频来不及播放。需要用`SDL_Delay`或类似机制保持程序运行。\n4.  **设备ID比较**：`SDL_OpenAudioDevice`返回的设备ID是一个无符号整数（`SDL_AudioDeviceID`），在错误检查时，应比较其是否等于`0`，而不是与`NULL`（指针）比较，否则会引发编译警告。\n5.  **内存管理**：`SDL_LoadWAV`分配的音频缓冲区（`audioBuffer`）需要在使用后通过`SDL_FreeWAV`手动释放，以避免内存泄漏。\n\n## 复习卡片\n\n**Q1:** 使用SDL播放音频，第一步必须执行的操作是什么？\n**A1:** 调用 `SDL_Init(SDL_INIT_AUDIO)` 来初始化SDL的音频子系统。\n\n**Q2:** `SDL_LoadWAV` 函数的主要作用和输出参数是什么？\n**A2:** 作用是加载WAV文件并解析其音频格式。它通过指针参数输出三个结果：1) `SDL_AudioSpec`（音频格式信息），2) `Uint8*` 指针（指向分配的音频数据缓冲区），3) `Uint32`（音频数据的长度）。\n\n**Q3:** 使用 `SDL_QueueAudio` 将音频数据放入队列后，如何才能让设备开始播放？\n**A3:** 必须调用 `SDL_PauseAudioDevice(device_id, 0)`，第二个参数 `0` 表示取消暂停，从而启动播放。\n\n**Q4:** `SDL_OpenAudioDevice` 函数返回值 `0` 通常代表什么？应如何检查错误？\n**A4:** 返回值 `0` 通常表示打开设备失败。应检查返回的设备ID是否等于 `0`（而非 `NULL`），以判断是否出错。\n\n**Q5:** 播放音频后，程序立即退出导致听不到声音，怎么办？\n**A5:** 在启动播放后，使用 `SDL_Delay(毫秒数)` 让程序暂停一段时间，以等待音频播放完成。\n\n**Q6:** 在资源清理阶段，必须按什么顺序释放SDL音频资源？\n**A6:** 顺序为：1) `SDL_CloseAudioDevice` (关闭设备)，2) `SDL_FreeWAV` (释放音频数据)，3) `SDL_Quit` (退出SDL)。\n\n**Q7:** 本教程中，`SDL_LoadWAV` 第一个参数（文件名）的写法是什么？\n**A7:** 直接传入一个字符串字面量，如 `\"sampleWave.wav\"`。\n\n**Q8:** 为什么在 `SDL_OpenAudioDevice` 中，传递给“期望的”和“获得的”`SDL_AudioSpec` 的是同一个结构体变量？\n**A8:** 在这个简单示例中，开发者使用 `SDL_LoadWAV` 获得的音频规格作为期望的格式，并希望设备尽可能匹配。同时将同一个变量也用于接收设备实际获得的参数，这样可以直接检查设备是否满足了要求。", "transcriptSegments": [{"index": 0, "timestamp": "00:00", "text": "你也許你會記得這些古龍的遊戲"}, {"index": 1, "timestamp": "00:02", "text": "以及還有這些古柒種"}, {"index": 2, "timestamp": "00:03", "text": "此時你戳出像樂和作品的"}, {"index": 3, "timestamp": "00:26", "text": "我們就要想想如何Sdl Audio 是應該的作用"}, {"index": 4, "timestamp": "00:33", "text": "所以我會創造一個audio.c file"}, {"index": 5, "timestamp": "00:38", "text": "包括Sdl2 Sdl"}, {"index": 6, "timestamp": "00:44", "text": "這應該是我們需要的一層"}, {"index": 7, "timestamp": "00:47", "text": "然後我會創造一個主流的方式"}, {"index": 8, "timestamp": "01:21", "text": "我們需要用SdlCompilation 按鍵"}, {"index": 9, "timestamp": "01:28", "text": "如果我們把Sdl documentation 拉開"}, {"index": 10, "timestamp": "01:31", "text": "我們可以找到這個按鍵"}, {"index": 11, "timestamp": "01:34", "text": "在這個介紹中"}, {"index": 12, "timestamp": "01:36", "text": "我用Sdl2 所以要小心"}, {"index": 13, "timestamp": "01:38", "text": "這裡有一個不同的按鍵"}, {"index": 14, "timestamp": "01:43", "text": "它是在設定的"}, // ===== Simple Markdown Renderer =====
function renderMarkdown(md) {
  if (!md) return '';
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

function setupSearch(inputId, countId, prevId, nextId, targetEl) {
  const input = $(`#${inputId}`);
  const countEl = $(`#${countId}`);
  const prevBtn = $(`#${prevId}`);
  const nextBtn = $(`#${nextId}`);
  let marks = [];
  let currentIdx = -1;

  function doSearch() {
    // Remove old marks
    targetEl.querySelectorAll('mark').forEach(m => {
      const t = document.createTextNode(m.textContent);
      m.parentNode.replaceChild(t, m);
      m.parentNode.normalize();
    });
    marks = [];
    currentIdx = -1;
    const q = input.value.trim();
    if (!q) { countEl.textContent = ''; return; }

    const walker = document.createTreeWalker(targetEl, NodeFilter.SHOW_TEXT);
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');

    nodes.forEach(node => {
      const text = node.textContent;
      if (!re.test(text)) return;
      re.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let last = 0;
      let m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        const mark = document.createElement('mark');
        mark.textContent = m[0];
        frag.appendChild(mark);
        marks.push(mark);
        last = re.lastIndex;
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });

    countEl.textContent = marks.length ? `0/${marks.length}` : 'No results';
    if (marks.length) navigateSearch(1);
  }

  function navigateSearch(dir) {
    if (!marks.length) return;
    if (currentIdx >= 0) marks[currentIdx].classList.remove('current');
    currentIdx = (currentIdx + dir + marks.length) % marks.length;
    marks[currentIdx].classList.add('current');
    marks[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    countEl.textContent = `${currentIdx + 1}/${marks.length}`;
  }

  input.addEventListener('input', doSearch);
  prevBtn.addEventListener('click', () => navigateSearch(-1));
  nextBtn.addEventListener('click', () => navigateSearch(1));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') navigateSearch(e.shiftKey ? -1 : 1);
  });
}

setupSearch('search-input', 'search-count', 'search-prev', 'search-next', summaryEl);

  if (quality < 2) { card.interval = 0; card.reviews = 0; }
  else {
    if (card.reviews === 0) card.interval = 1;
    else if (card.reviews === 1) card.interval = 6;
    else card.interval = Math.round(card.interval * card.ease);
    card.reviews++;
  }
  card.ease = Math.max(1.3, card.ease + (0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02)));
  const d = new Date();
  d.setDate(d.getDate() + card.interval);
  card.due = d.toISOString().slice(0, 10);
}

function getDueCards() {
  const srs = loadSRS();
  const t = today();
  return DATA.cards.map((c, i) => {
    const state = srs[i] || initCardState(i);
    return { ...c, idx: i, state, isDue: state.due <= t };
  });
}

function renderCards() {
  const deck = $('#card-deck');
  if (!deck) return;
  const allCards = getDueCards();
  const dueCount = allCards.filter(c => c.isDue).length;
  const info = $('#cards-due-info');
  if (info) info.textContent = `${dueCount} due today / ${allCards.length} total`;

  deck.innerHTML = allCards.map((c, i) => {
    const statusLabel = c.state.reviews === 0 ? 'New' : `Interval: ${c.state.interval}d`;
    return `<div class="flash-card" data-idx="${i}">
      <div class="card-inner">
        <div class="card-front">
          <div class="card-label">Q${i + 1}</div>
          <div class="card-text">${escHtml(c.question)}</div>
          <div style="font-size:.7rem;color:var(--fg3);margin-top:auto">${statusLabel}</div>
        </div>
        <div class="card-back">
          <div class="card-label">A${i + 1}</div>
          <div class="card-text">${escHtml(c.answer)}</div>
          <div class="card-status">
            <button class="s-0" data-quality="0">Forgot</button>
            <button class="s-1" data-quality="1">Hard</button>
            <button class="s-2" data-quality="2">Good</button>
            <button class="s-3" data-quality="3">Easy</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  deck.querySelectorAll('.flash-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.card-status')) return;
      card.classList.toggle('flipped');
    });
    card.querySelectorAll('.card-status button').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const idx = parseInt(card.dataset.idx);
        const quality = parseInt(btn.dataset.quality);
        const srs = loadSRS();
        if (!srs[idx]) srs[idx] = initCardState(idx);
        sm2(srs[idx], quality);
        saveSRS(srs);
        card.classList.remove('flipped');
        setTimeout(() => renderCards(), 300);
      });
    });
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== SRS Review Mode =====
function startSRS() {
  const dueCards = getDueCards().filter(c => c.isDue);
  if (!dueCards.length) { alert('No cards due today!'); return; }

  const overlay = $('#srs-overlay');
  const session = $('#srs-session');
  overlay.classList.add('active');
  let current = 0;

  function showCard() {
    if (current >= dueCards.length) {
      session.innerHTML = `<div class="srs-done">
        <h2>Review Complete!</h2>
        <p>You reviewed ${dueCards.length} cards.</p>
        <button class="btn btn-primary" id="srs-close">Close</button>
      </div>`;
      $('#srs-close').addEventListener('click', () => overlay.classList.remove('active'));
      return;
    }
    const c = dueCards[current];
    session.innerHTML = `
      <div class="srs-progress">${current + 1} / ${dueCards.length}</div>
      <div class="srs-card" id="srs-card">
        <div class="card-inner">
          <div class="card-front"><div class="card-text">${escHtml(c.question)}</div></div>
          <div class="card-back"><div class="card-text">${escHtml(c.answer)}</div></div>
        </div>
      </div>
      <div class="srs-buttons" id="srs-btns" style="display:none">
        <button style="background:var(--red)" data-q="0">Forgot</button>
        <button style="background:var(--orange)" data-q="1">Hard</button>
        <button style="background:var(--green)" data-q="2">Good</button>
        <button style="background:var(--accent)" data-q="3">Easy</button>
      </div>`;

    const card = $('#srs-card');
    const btns = $('#srs-btns');
    card.addEventListener('click', () => {
      card.classList.toggle('flipped');
      if (card.classList.contains('flipped')) btns.style.display = 'flex';
    });
    btns.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const srs = loadSRS();
        if (!srs[c.idx]) srs[c.idx] = initCardState(c.idx);
        sm2(srs[c.idx], parseInt(btn.dataset.q));
        saveSRS(srs);
        current++;
        showCard();
      });
    });
  }
  showCard();
}

// Cards controls
if ($('#srs-start')) {
  $('#srs-start').addEventListener('click', startSRS);
  $('#cards-reset').addEventListener('click', () => {
    if (confirm('Reset all card progress?')) {
      localStorage.removeItem(SRS_KEY);
      renderCards();
    }
  });
  renderCards();
}

// ===== Timeline =====
function renderTimeline() {
  const tl = $('#timeline');
  if (!tl) return;
  const transcriptSegs = DATA.transcriptSegments;

  tl.innerHTML = DATA.frames.map((f, i) => {
    // Estimate matching transcript segment
    const segIdx = transcriptSegs.length > 1
      ? Math.round(i / (DATA.frames.length - 1) * (transcriptSegs.length - 1))
      : 0;
    const seg = transcriptSegs[segIdx];
    const segText = seg ? seg.text : '';
    return `<div class="timeline-item" data-seg-idx="${segIdx}">
      <div class="tl-time">${f.timestamp || ''}</div>
      <img class="tl-frame" src="${f.data_uri}" alt="Frame ${i + 1}" data-frame-idx="${i}">
      ${segText ? `<div class="tl-text">${escHtml(segText.slice(0, 120))}${segText.length > 120 ? '...' : ''}</div>` : ''}
    </div>`;
  }).join('');

  // Frame click → open lightbox
  tl.querySelectorAll('.tl-frame').forEach(img => {
    img.addEventListener('click', () => {
      openLightbox(parseInt(img.dataset.frameIdx));
    });
  });

  // Timeline text click → jump to transcript segment
  tl.querySelectorAll('.tl-text').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      const segIdx = parseInt(el.closest('.timeline-item').dataset.segIdx);
      $$('.nav-tab').forEach(t => t.classList.remove('active'));
      $$('.panel').forEach(p => p.classList.remove('active'));
      $$('.nav-tab').forEach(t => { if (t.dataset.tab === 'transcript') t.classList.add('active'); });
      $('#panel-transcript').classList.add('active');
      const segEl = document.querySelector(`.transcript-seg[data-idx="${segIdx}"]`);
      if (segEl) {
        segEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        segEl.classList.add('highlight');
        setTimeout(() => segEl.classList.remove('highlight'), 3000);
      }
    });
  });
}
renderTimeline();

// ===== Transcript =====
function renderTranscript() {
  const body = $('#transcript-body');
  if (!body) return;
  const notes = (loadSRS()).notes || {};

  body.innerHTML = DATA.transcriptSegments.map((seg, i) => {
    const note = notes[i];
    return `<div class="transcript-seg" data-idx="${i}">
      <span class="seg-time">${seg.timestamp || ''}</span>
      <span class="seg-text">${escHtml(seg.text)}</span>
      <button class="note-btn ${note ? 'has-note' : ''}" data-idx="${i}" title="Add note">&#128221;</button>
    </div>
    ${note ? `<div class="seg-note" data-note-idx="${i}">${escHtml(note)}</div>` : ''}`;
  }).join('');

  // Note buttons
  body.querySelectorAll('.note-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = btn.dataset.idx;
      const existing = body.querySelector(`.note-input-wrap[data-note-idx="${idx}"]`);
      if (existing) { existing.remove(); return; }

      const wrap = document.createElement('div');
      wrap.className = 'note-input-wrap';
      wrap.dataset.noteIdx = idx;
      const srs = loadSRS();
      const notes = srs.notes || {};
      wrap.innerHTML = `
        <textarea placeholder="Write a note...">${notes[idx] || ''}</textarea>
        <button class="btn btn-primary" data-action="save">Save</button>
        <button class="btn btn-ghost" data-action="cancel">Cancel</button>
        ${notes[idx] ? '<button class="btn btn-ghost" data-action="delete" style="color:var(--red)">Delete</button>' : ''}`;

      const segEl = body.querySelector(`.transcript-seg[data-idx="${idx}"]`);
      segEl.after(wrap);
      wrap.querySelector('textarea').focus();

      wrap.addEventListener('click', e => {
        const action = e.target.dataset.action;
        if (!action) return;
        const srs = loadSRS();
        if (!srs.notes) srs.notes = {};
        if (action === 'save') {
          const text = wrap.querySelector('textarea').value.trim();
          if (text) srs.notes[idx] = text;
          else delete srs.notes[idx];
          saveSRS(srs);
          renderTranscript();
        } else if (action === 'delete') {
          delete srs.notes[idx];
          saveSRS(srs);
          renderTranscript();
        } else {
          wrap.remove();
        }
      });
    });
  });
}
renderTranscript();

// Transcript search
setupSearch('ts-search', 'ts-search-count', 'ts-search-prev', 'ts-search-next', $('#transcript-body'));

// ===== Lightbox =====
let lbFrames = DATA.frames;
let lbIdx = 0;

function openLightbox(idx) {
  lbIdx = idx;
  const lb = $('#lightbox');
  lb.classList.add('active');
  updateLightbox();
}

function updateLightbox() {
  $('#lb-img').src = lbFrames[lbIdx].data_uri;
  $('#lb-counter').textContent = `${lbIdx + 1} / ${lbFrames.length}`;
}

$('#lb-prev').addEventListener('click', e => { e.stopPropagation(); lbIdx = (lbIdx - 1 + lbFrames.length) % lbFrames.length; updateLightbox(); });
$('#lb-next').addEventListener('click', e => { e.stopPropagation(); lbIdx = (lbIdx + 1) % lbFrames.length; updateLightbox(); });
$('#lightbox').addEventListener('click', e => { if (e.target === $('#lightbox') || e.target === $('#lb-img')) $('#lightbox').classList.remove('active'); });

document.addEventListener('keydown', e => {
  const lb = $('#lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') lb.classList.remove('active');
  if (e.key === 'ArrowLeft') { lbIdx = (lbIdx - 1 + lbFrames.length) % lbFrames.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIdx = (lbIdx + 1) % lbFrames.length; updateLightbox(); }
});
</script>
</body>
