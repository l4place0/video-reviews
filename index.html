<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Reviews</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 24px 0; position: sticky; top: 0; z-index: 10; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        h1 { font-size: 24px; font-weight: 600; }
        .count { color: #888; font-size: 14px; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag-btn { padding: 4px 12px; border: 1px solid #ddd; border-radius: 16px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
        .tag-btn:hover { border-color: #888; }
        .tag-btn.active { background: #333; color: #fff; border-color: #333; }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
        .waterfall { column-count: 3; column-gap: 20px; }
        @media (max-width: 900px) { .waterfall { column-count: 2; } }
        @media (max-width: 600px) { .waterfall { column-count: 1; } }
        .card { break-inside: avoid; background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #e8e8e8; transition: box-shadow 0.2s; }
        .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-platform { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-title { font-size: 16px; font-weight: 600; margin: 8px 0; line-height: 1.4; }
        .card-title a { color: #333; text-decoration: none; }
        .card-title a:hover { color: #0066cc; }
        .card-date { font-size: 13px; color: #aaa; margin-bottom: 8px; }
        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .card-tag { font-size: 12px; padding: 2px 8px; background: #f0f0f0; border-radius: 4px; color: #666; }
        .card-preview { font-size: 14px; color: #555; line-height: 1.6; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        .empty h2 { font-size: 20px; margin-bottom: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div>
                <h1>Video Reviews</h1>
                <span class="count">3 reviews</span>
            </div>
            <div class="filters">
                <button class="tag-btn active" data-tag="all">All</button>
                
                <button class="tag-btn" data-tag="ArrayList">ArrayList</button>
                
                <button class="tag-btn" data-tag="C/C++">C/C++</button>
                
                <button class="tag-btn" data-tag="Coding">Coding</button>
                
                <button class="tag-btn" data-tag="C语言">C语言</button>
                
                <button class="tag-btn" data-tag="Linux">Linux</button>
                
                <button class="tag-btn" data-tag="RookieOnline菜鸟在线">RookieOnline菜鸟在线</button>
                
                <button class="tag-btn" data-tag="SDL">SDL</button>
                
                <button class="tag-btn" data-tag="bilibili高考季">bilibili高考季</button>
                
                <button class="tag-btn" data-tag="general">general</button>
                
                <button class="tag-btn" data-tag="tutorial">tutorial</button>
                
                <button class="tag-btn" data-tag="【中文字幕】">【中文字幕】</button>
                
                <button class="tag-btn" data-tag="专业">专业</button>
                
                <button class="tag-btn" data-tag="中国">中国</button>
                
                <button class="tag-btn" data-tag="发现《我的小小世界里》">发现《我的小小世界里》</button>
                
                <button class="tag-btn" data-tag="哔需健康">哔需健康</button>
                
                <button class="tag-btn" data-tag="大师">大师</button>
                
                <button class="tag-btn" data-tag="奇葩">奇葩</button>
                
                <button class="tag-btn" data-tag="数据结构">数据结构</button>
                
                <button class="tag-btn" data-tag="生命游戏">生命游戏</button>
                
                <button class="tag-btn" data-tag="编程">编程</button>
                
                <button class="tag-btn" data-tag="网友">网友</button>
                
                <button class="tag-btn" data-tag="高能">高能</button>
                
            </div>
        </div>
    </div>

    <div class="container">
        <div id="cards" class="waterfall"></div>
        <div id="empty" class="empty hidden">
            <h2>No reviews found</h2>
            <p>No reviews match the selected filter.</p>
        </div>
    </div>

    const cardsEl = document.getElementById('cards');
    const emptyEl = document.getElementById('empty');

    function renderCards(list) {
        if (list.length === 0) {
            cardsEl.innerHTML = '';
            emptyEl.classList.remove('hidden');
            return;
        }
        emptyEl.classList.add('hidden');
        cardsEl.innerHTML = list.map(r => `
            <div class="card">
                <div class="card-platform">${r.platform}</div>
                <div class="card-title"><a href="${r.url}">${r.title}</a></div>
                <div class="card-date">${r.date}</div>
                <div class="card-tags">${r.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
                <div class="card-preview">${r.summary_preview}</div>
            </div>
        `).join('');
    }

    // Tag filter
    document.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tag = btn.dataset.tag;
            const filtered = tag === 'all' ? reviews : reviews.filter(r => r.tags.includes(tag));
            renderCards(filtered);
        });
    });

    // Initial render
    renderCards(reviews);
    </script>
</body>
</html>
